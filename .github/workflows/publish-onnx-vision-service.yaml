name: Publish ONNX Vision Service

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Validating tag: $TAG"
          if [[ $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]*)?$ ]]; then
            echo "Tag matches semver."
          else
            echo "Error: tag does not match semver format (expected X.Y.Z or X.Y.Z-rcN)"
            exit 1
          fi

  publish:
    needs: validate-tag
    name: Build and publish module (Linux/macOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Publish
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: viamrobotics/build-action@v1.6
        with:
          version: ${{ github.event.release.tag_name }}
          ref: ${{ github.sha }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_value }}
          token: ${{ github.token }}

  publish-windows:
    needs: validate-tag
    name: Build and publish module (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Viam CLI
        run: |
          curl -o viam.exe "https://storage.googleapis.com/packages.viam.com/apps/viam-cli/viam-cli-latest-windows-amd64.exe"
          ./viam.exe version

      - name: Setup module
        run: make -C src/onnx_vision_service setup

      - name: Build module
        run: make -C src/onnx_vision_service dist/archive.tar.gz

      - name: Publish to registry
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          ./viam.exe login api-key --key-id ${{ secrets.viam_key_id }} --key ${{ secrets.viam_key_value }}
          ./viam.exe module upload --platform windows/amd64 --version ${{ github.ref_name }} --upload dist/archive.tar.gz
