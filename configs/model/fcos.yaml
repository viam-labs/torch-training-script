#model:
  name: fcos
  device: cuda
  # num_classes is auto-computed from the 'classes' config at runtime

  transform:
    input_size: [480, 640]
    image_mean: [0.485, 0.456, 0.406]  # ImageNet RGB stats
    image_std: [0.229, 0.224, 0.225]
  backbone: resnet50_fpn

  # FCOS specific freeze options (only apply when pretrained=true)
  freeze_fpn: false
