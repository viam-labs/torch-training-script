name: jsonl

# Dataset paths
# Each directory must contain: dataset.jsonl + data/ (with images)
# Example structure:
#   my_dataset/
#     dataset.jsonl
#     data/
#       image1.jpg
#       image2.jpg
data:
  train_dir: null   # Required: directory containing dataset.jsonl + data/
  val_dir: null     # Optional: if null, auto-split from train_dir (see training.val_split)

# Normalization statistics for the model's internal GeneralizedRCNNTransform.
# These override model.transform.image_mean/std before model creation, so the
# resolved values are saved in the Hydra output config and picked up by ONNX export.
#
# Priority (highest wins):
#   1. Explicit image_mean/image_std below (manual override)
#   2. compute_from_dataset: true  (auto-compute from training images)
#   3. Model config defaults (ImageNet stats)
#
# Ignored when training.pretrained=true (pretrained models use built-in stats).
normalization:
  compute_from_dataset: false   # Compute per-channel mean/std from training images
  image_mean: null              # Manual override, e.g. [0.52, 0.48, 0.45]
  image_std: null               # Manual override, e.g. [0.21, 0.20, 0.19]

# Transform configuration
# Note: Transforms are applied via GPUCollate in the dataloader BEFORE model.forward()
#
# NORMALIZATION: DO NOT add Normalize here!
# All torchvision detection models (Faster R-CNN, SSDLite) have a built-in
# GeneralizedRCNNTransform that handles normalization AND resize internally.
# Adding Normalize here would cause DOUBLE normalization → broken model output.
#
# RESIZE: Keep Resize here for batching.
# Images in a batch must be the same size for torch.stack(). The model's internal
# transform will then see already-resized images and essentially skip its own resize.
#
# AUGMENTATIONS: Add augmentations here (flip, rotation, jitter, etc.)
# The model does NOT do augmentations — that's the dataloader's job.
#
# RECOMMENDATION:
#   - Set model.transform.input_size to match the model's expected size
#   - Faster R-CNN pretrained: [800, 1333]
#   - SSDLite pretrained: [320, 320]
#   - Training from scratch: Any size you want
transform:
  train:
    # Resize is REQUIRED for batching. Should match model's internal transform size.
    # ${model.transform.input_size} automatically adapts to your model config
    - name: Resize
      params:
        size: ${model.transform.input_size}
    - name: BackgroundStrip
      params:
        dist: 150
    # Augmentations (uncomment as needed):
    # - name: RandomRotation
    #   params: 
    #     degrees: 10 
    #     p: 0.3
    #     expand: false
    # - name: RandomHorizontalFlip
    #   params:
    #     p: 0.5 
    # - name: RandomVerticalFlip
    #   params:
    #     p: 0.2 
    # - name: ColorJitter
    #   params:
    #     brightness: 0.2 
    #     contrast: 0.2
    #     p: 0.5
    # - name: RandomGaussianNoise
    #   params:
    #     mean: 0.0
    #     std: 0.1
    #     p: 0.5
    # - name: RandomGamma
    #   params: 
    #     gamma: 1
    #     p: 0.5

  val:
    - name: Resize
      params:
        size: ${model.transform.input_size}
    - name: BackgroundStrip
      params:
        dist: 150
        
  test:
    - name: Resize
      params:
        size: ${model.transform.input_size}
    - name: BackgroundStrip
      params:
        dist: 150
